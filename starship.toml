"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_surface2)\
$os\
[](fg:color_surface2 bg:color_sapphire)\
$directory\
[](fg:color_sapphire bg:color_yellow)\
$git_branch\
$git_status\
[](fg:color_yellow bg:color_green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_green bg:color_mauve)\
$docker_context\
$conda\
[](fg:color_mauve bg:color_surface2)\
[ ](fg:color_surface2)\
$character"""

palette = 'mocha'

